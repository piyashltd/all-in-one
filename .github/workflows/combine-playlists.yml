name: Combine M3U Playlists

on:
  push:
    branches:
      - main
    paths:
      - 'channels/**.m3u'
      - 'series/**.m3u'
      - 'movies/**.m3u'
      - 'islamic/**.m3u'
      - 'songs/**.m3u'
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine and Sort M3U files
        run: |
          # ==========================================
          # Configuration Area
          # ==========================================
          
          # Playlists to keep at the top (Unsorted)
          PRIORITY_FILES=("channels/channels.m3u" "movies/movies.m3u" "islamic/gojol.m3u" "series/aa-ks-s1.m3u")
          
          # Keyword to identify your custom series inside all-series.m3u
          CUSTOM_SERIES_KEYWORD="Kurulus Osman|Shikari Kuzgun|Sa Re Ga Ma Pa - Bangla S03|Naagin S07|Aladdin"
          
          # ==========================================
          
          echo "✅ Normalizing group-titles to unify variations (e.g. 'Shiva - S01' and 'Shiva S01')..."
          # Pass 1: Collect counts and determine the majority title for each normalized string
          find . -type f -name "*.m3u" ! -name "index.m3u" -print0 | xargs -0 cat | gawk '
          /^#EXTINF/ {
              if (match($0, /group-title="([^"]+)"/, arr)) {
                  title = arr[1]
                  norm = tolower(title)
                  gsub(/[^a-z0-9]/, "", norm) # Strip spaces and symbols for comparison
                  count[title]++
                  if (count[title] > max[norm]) {
                      max[norm] = count[title]
                      best[norm] = title
                  }
              }
          }
          END {
              for (n in best) print n "___" best[n]
          }' > title_map.txt

          # Pass 2: Rewrite files to apply the unified group-title
          find . -type f -name "*.m3u" ! -name "index.m3u" | while read -r file; do
              gawk '
              BEGIN {
                  while ((getline < "title_map.txt") > 0) {
                      split($0, parts, "___")
                      best[parts[1]] = parts[2]
                  }
              }
              /^#EXTINF/ {
                  if (match($0, /group-title="([^"]+)"/, arr)) {
                      title = arr[1]
                      norm = tolower(title)
                      gsub(/[^a-z0-9]/, "", norm)
                      if (best[norm] != "" && best[norm] != title) {
                          target = "group-title=\"" title "\""
                          replacement = "group-title=\"" best[norm] "\""
                          idx = index($0, target)
                          if (idx > 0) {
                              $0 = substr($0, 1, idx - 1) replacement substr($0, idx + length(target))
                          }
                      }
                  }
                  print
                  next
              }
              { print }
              ' "$file" > "${file}.tmp" && mv "${file}.tmp" "$file"
          done
          
          # 🧹 Clean up temporary backup files generated during the rewriting process
          rm -f title_map.txt
          find . -type f -name "*.tmp" -delete
          echo "✅ Cleaned up temporary backup files."

          echo '#EXTM3U x-tvg-url="YOUR_EPG_URL_HERE.xml"' > index.m3u

          # Smart sorting function: Ignores links and dates, sorts only by episode name/number
          sort_m3u() {
            local file=$1
            grep -v "^#EXTM3U" "$file" | sed '/^$/d' | awk '/^#EXTINF/ {printf "%s|", $0; next} {print $0}' | \
            awk -F',' '{ name=$NF; gsub(/\([^)]*\)/, "", name); print name "^^^" $0 }' | \
            sort -t'^' -k1,1fV | \
            sed 's/^.*^^^//' | \
            tr '|' '\n'
          }

          get_m3u() {
            local file=$1
            grep -h -v "^#EXTM3U" "$file" | sed '/^$/d'
          }

          echo "✅ Processing Priority Files first (Unsorted)..."
          for p_file in "${PRIORITY_FILES[@]}"; do
            if [ -f "$p_file" ]; then
              echo "Adding priority file: $p_file"
              get_m3u "$p_file" >> index.m3u
            else
              echo "⚠️ Priority file not found: $p_file (Skipping...)"
            fi
          done

          # Add Custom Series to the TOP of the global index.m3u
          CUSTOM_SERIES_FILE="series/all-series.m3u"
          if [ -f "$CUSTOM_SERIES_FILE" ]; then
            echo "✅ Extracting Custom Series to place at the Top of global index..."
            grep -v "^#EXTM3U" "$CUSTOM_SERIES_FILE" | sed '/^$/d' | awk '/^#EXTINF/ {printf "%s|", $0; next} {print $0}' | grep -E -i "$CUSTOM_SERIES_KEYWORD" | \
            awk -F',' '{ name=$NF; gsub(/\([^)]*\)/, "", name); print name "^^^" $0 }' | \
            sort -t'^' -k1,1fV | \
            sed 's/^.*^^^//' | \
            tr '|' '\n' >> index.m3u
          fi

          echo "✅ Processing Category Folders..."
          folders=("channels" "series" "movies" "islamic" "songs")

          for folder in "${folders[@]}"; do
            if [ -d "$folder" ]; then
              echo "Processing directory: $folder..."
              echo '#EXTM3U' > "$folder/index.m3u"
              
              for file in "$folder"/*.m3u; do
                [ -e "$file" ] || continue
                [ "$file" == "$folder/index.m3u" ] && continue
                
                # Check if the current file is a priority file to prevent double addition
                is_priority=0
                for p in "${PRIORITY_FILES[@]}"; do
                  if [[ "$p" == "$file" ]]; then
                    is_priority=1
                    break
                  fi
                done
                
                # --- Special File Handling: series/all-series.m3u ---
                if [[ "$file" == "series/all-series.m3u" ]]; then
                  echo "Processing customized internal sort for: $file"
                  
                  # Bring all items to a single line
                  grep -v "^#EXTM3U" "$file" | sed '/^$/d' | awk '/^#EXTINF/ {printf "%s|", $0; next} {print $0}' > temp_all.txt
                  
                  # Regular series (without keyword) - Unsorted
                  grep -E -i -v "$CUSTOM_SERIES_KEYWORD" temp_all.txt > top_unsorted.txt
                  
                  # Custom series (with keyword) - Smart Sorted A-Z
                  grep -E -i "$CUSTOM_SERIES_KEYWORD" temp_all.txt | \
                  awk -F',' '{ name=$NF; gsub(/\([^)]*\)/, "", name); print name "^^^" $0 }' | \
                  sort -t'^' -k1,1fV | \
                  sed 's/^.*^^^//' > custom_sorted.txt
                  
                  # Append both to the folder-specific index.m3u
                  cat top_unsorted.txt custom_sorted.txt | tr '|' '\n' >> "$folder/index.m3u"
                  
                  # Append ONLY the regular (non-keyword) series to the global index.m3u 
                  if [[ $is_priority -eq 0 ]]; then
                    cat top_unsorted.txt | tr '|' '\n' >> index.m3u
                  fi
                  
                  # Cleanup these sorting temp files as well
                  rm -f temp_all.txt top_unsorted.txt custom_sorted.txt
                  continue
                fi
                # --- End Special File Handling ---
                
                # --- General File Logic ---
                if [[ $is_priority -eq 1 ]]; then
                  # Priority file logic for folder index (Unsorted)
                  # It is NOT added to root index.m3u here because it was already added at the top!
                  get_m3u "$file" >> "$folder/index.m3u"
                else
                  # Standard files get sorted A-Z for both indexes
                  echo "Sorting $file A-Z..."
                  sort_m3u "$file" > temp_sorted.m3u
                  cat temp_sorted.m3u >> "$folder/index.m3u"
                  cat temp_sorted.m3u >> index.m3u
                  rm -f temp_sorted.m3u
                fi
              done
            else
              echo "Directory $folder not found. Skipping..."
            fi
          done
          
          echo "✅ Global and folder-specific index.m3u files generated successfully."

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Group-Title unified, Double insertion fixed & Workspace cleaned"
          file_pattern: 'index.m3u */index.m3u */*.m3u'
          commit_options: '--no-verify'
