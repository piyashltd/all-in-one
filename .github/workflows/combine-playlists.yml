name: Combine M3U Playlists

on:
  push:
    branches:
      - main
    paths:
      # Track all .m3u files inside specific folders
      - 'channels/**.m3u'
      - 'series/**.m3u'
      - 'movies/**.m3u'
      - 'islamic/**.m3u'
      - 'songs/**.m3u'

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine M3U files
        run: |
          # Create a fresh global index.m3u file in the root directory
          echo '#EXTM3U x-tvg-url="YOUR_EPG_URL_HERE.xml"' > index.m3u
          
          # Define the list of category folders
          folders=("channels" "series" "movies" "islamic" "songs")

          for folder in "${folders[@]}"; do
            # Check if the folder exists before processing
            if [ -d "$folder" ]; then
              echo "Processing directory: $folder..."
              
              # Create a fresh local index.m3u inside the specific folder
              echo '#EXTM3U' > "$folder/index.m3u"
              
              # Find all .m3u files EXCEPT index.m3u to prevent duplication
              # Append the content to the local folder's index.m3u
              find "$folder" -type f -name "*.m3u" ! -name "index.m3u" -exec grep -h -v "#EXTM3U" {} + >> "$folder/index.m3u"
              
              # Append the exact same content to the global index.m3u in the root
              find "$folder" -type f -name "*.m3u" ! -name "index.m3u" -exec grep -h -v "#EXTM3U" {} + >> index.m3u
            else
              echo "Directory $folder not found. Skipping..."
            fi
          done
          
          echo "✅ Global and folder-specific index.m3u files generated successfully."

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update global and folder-specific index.m3u files"
          # Commit the root index.m3u and any index.m3u inside the folders
          file_pattern: 'index.m3u */index.m3u'
          commit_options: '--no-verify'
