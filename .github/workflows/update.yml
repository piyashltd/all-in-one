name: Auto Update M3U Playlist

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write # গিটহাবকে সরাসরি পুশ করার পারমিশন দেওয়া হলো

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Python Script
        env:
          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }} # আপনার সিক্রেটটি এখানে পাস করা হলো
        run: python update_m3u.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add audio/hq-quality.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-updated M3U playlist via API" && git push)
