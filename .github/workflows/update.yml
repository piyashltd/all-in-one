name: Auto Update M3U Playlist

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর নিজে নিজে রান করবে
  workflow_dispatch: # ম্যানুয়ালি রান করার বাটন চালু করার জন্য

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Python Script
        run: python update_m3u.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add audio/hq-quality.m3u
          
          # যদি ফাইলে কোনো পরিবর্তন (নতুন গান বা ডুপ্লিকেট রিমুভ) হয়, তবেই পুশ করবে
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-updated M3U playlist & cleaned duplicates" && git push)
